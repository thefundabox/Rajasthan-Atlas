<body>

  <header class="a-header">
    <div>
      <h1><a href="./" style="color:inherit;text-decoration:none">Rajasthan Atlas</a></h1>
      <div class="subtitle"><a href="./" style="color:inherit;text-decoration:none" data-i18n="← Study Home">← Study Home</a> · <span data-i18n="Interactive Map">Interactive Map</span> · <span data-i18n="41 Districts">41 Districts</span> · <span data-i18n="7 Divisions">7 Divisions</span> · © <a href="./LICENSE" style="color:inherit" title="CC BY-NC-SA 4.0 — free for non-commercial use with attribution" data-i18n="RAS Only, CC BY-NC-SA 4.0">RAS Only, CC BY-NC-SA 4.0</a></div>
    </div>
    <div class="search-wrap">
      <div class="search">
        <span class="icon">⌕</span>
        <input type="search" data-i18n-placeholder="Search (press / to focus)…" placeholder="Search (press / to focus)…" spellcheck="false" autocomplete="off" aria-label="Search the atlas" />
        <button class="clear" aria-label="Clear search">×</button>
        <div class="search-results" role="listbox"></div>
      </div>
    </div>
    <!-- .h-nav populated by UIManager -->
  </header>

  <main class="a-map" aria-label="Map of Rajasthan"></main>

  <aside class="a-right" aria-label="Selection details">
    <div class="detail-slot"></div>
  </aside>

  <footer class="a-status" aria-live="polite">
    <div class="s-item"><span class="s-label">Loading…</span></div>
  </footer>

  <script type="module">
    import { Atlas } from './atlas/core/AtlasCore.js';
    import { t, getLang } from './atlas/core/i18n.js';
    // Translate any element carrying data-i18n / data-i18n-placeholder / data-i18n-title
    // before Atlas.boot builds the header nav (which reads the language too).
    for (const el of document.querySelectorAll('[data-i18n]')) {
      el.textContent = t(el.dataset.i18n);
    }
    for (const el of document.querySelectorAll('[data-i18n-placeholder]')) {
      el.setAttribute('placeholder', t(el.dataset.i18nPlaceholder));
    }
    for (const el of document.querySelectorAll('[data-i18n-title]')) {
      el.setAttribute('title', t(el.dataset.i18nTitle));
    }
    import './atlas/layers/TerrainLayer.js';
    import './atlas/layers/EnvironmentLayer.js';
    import './atlas/layers/HydrologyLayer.js';
    import './atlas/layers/ReliefLayer.js';
    import './atlas/layers/PhysiographyLayer.js';
    import './atlas/layers/LocatorInset.js';
    import './atlas/layers/ClimateLayer.js';
    import './atlas/layers/SoilLayer.js';
    import './atlas/layers/VegetationLayer.js';
    import './atlas/layers/AgricultureLayer.js';
    import './atlas/layers/IrrigationLayer.js';
    import './atlas/layers/WaterResourcesLayer.js';
    import './atlas/layers/GeologyLayer.js';
    import './atlas/layers/MineralsLayer.js';
    import './atlas/layers/MiningLayer.js';
    import './atlas/layers/IndustryLayer.js';
    import './atlas/layers/IndustrialSitesLayer.js';
    import './atlas/layers/HandicraftsLayer.js';
    import './atlas/layers/EnergyLayer.js';
    import './atlas/layers/PowerPlantsLayer.js';
    import './atlas/layers/PopulationLayer.js';
    import './atlas/layers/AdministrativeLayer.js';
    import './atlas/layers/HumanGeographyLayer.js';
    import './atlas/layers/LegendPanel.js';
    import './atlas/layers/DistrictProfile.js';
    import './atlas/layers/CustomContent.js';
    import './atlas/layers/RevisionDashboard.js';
    import './atlas/layers/CompareMode.js';
    import './atlas/layers/CalloutMode.js';
    import './atlas/layers/IntegrationTimeline.js';
    import './atlas/layers/DynastiesTimeline.js';
    import './atlas/layers/RelatedHighlighter.js';
    import './atlas/layers/RegionZoneHighlighter.js';
    import './atlas/layers/SelectionBreadcrumb.js';
    import './atlas/layers/MobileChrome.js';
    import './atlas/layers/MobileFeatureTooltip.js';
    Atlas.boot(document.body);

    // Deep-link support for Study Home → Atlas navigation.
    // Reads ?preset=<mode> and ?feature=<id> from the URL and applies them
    // once the atlas is ready. Study Home links use these to jump users
    // straight to a topic view or a specific feature's detail card.
    Atlas.bus.on('atlas:ready', () => {
      const params = new URLSearchParams(location.search);
      const preset = params.get('preset');
      if (preset) setTimeout(() => Atlas.layers.setMode(preset), 80);
      // ?layers=layer-id-1,layer-id-2 — turn on specific layers (Study Home tiles
      // for content that doesn't have a corresponding preset mode).
      const layersParam = params.get('layers');
      if (layersParam) {
        setTimeout(() => {
          const ids = layersParam.split(',').map(s => s.trim()).filter(Boolean);
          for (const id of ids) {
            try { Atlas.layers.setVisible?.(id, true); } catch (_) {}
          }
        }, 120);
      }
      const feature = params.get('feature');
      if (feature) {
        // Custom layers load async via CustomContent — retry up to 2 s
        // in case the feature's layer is still registering when the
        // deep-link arrives (cold-start race).
        const tryResolve = (attempt = 0) => {
          for (const cfg of Atlas.layers.list()) {
            const f = Atlas.data.getFeature(cfg.id, feature);
            if (f) {
              try { Atlas.layers.setVisible?.(cfg.id, true); } catch (_) {}
              Atlas.interaction.select(cfg.id, feature, { zoom: true });
              return;
            }
          }
          if (attempt < 8) setTimeout(() => tryResolve(attempt + 1), 250);
        };
        setTimeout(tryResolve, 200);
      }
      // ?revise=1 — auto-open the Revision Dashboard overlay. The header
      // button [data-action="revision"] is injected by RevisionDashboard.js
      // during its own atlas:ready handler, so we retry a few times in
      // case it hasn't landed yet.
      if (params.get('revise')) {
        let tries = 0;
        const openRevise = () => {
          const btn = document.querySelector('button[data-action="revision"]');
          if (btn) { btn.click(); return; }
          if (++tries < 12) setTimeout(openRevise, 200);
        };
        setTimeout(openRevise, 200);
      }
    });
  </script>
</body>
</html>
